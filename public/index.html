<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Callibri</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- АВТОРИЗАЦИЯ -->
  <div id="auth">
    <div class="auth-card">
      <div class="auth-top">
        <div class="auth-logo">
          <div class="auth-logo-icon">✦</div>
          <div class="auth-logo-text">
            <h1>Callibri</h1>
            <p>Современный минималистичный мессенджер</p>
          </div>
        </div>
      </div>

      <div class="auth-fields">
        <input
          id="displayName"
          type="text"
          placeholder="Имя, например Александр"
          autocomplete="name"
        />

        <input
          id="username"
          type="text"
          placeholder="Логин, например username"
          autocomplete="username"
        />

        <div class="password-wrap">
          <input
            id="password"
            type="password"
            placeholder="Пароль"
            autocomplete="current-password"
          />
          <button id="togglePassword" type="button">Показать</button>
        </div>

        <label class="remember-row">
          <input id="rememberMe" type="checkbox" />
          <span>Не выходить</span>
        </label>
      </div>

      <div class="auth-actions">
        <button id="loginBtn" type="button">Войти</button>
        <button id="registerBtn" type="button">Регистрация</button>
      </div>

      <div id="authError"></div>
    </div>
  </div>

  <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
  <div id="app" class="hidden">
    <aside class="sidebar">
      <div class="brand-panel">
        <div class="brand-mark">C</div>
        <div class="brand-info">
          <div class="brand-title">Callibri</div>
          <div class="brand-subtitle">Messenger</div>
        </div>
      </div>

      <div class="profile">
        <div class="profile-info">
          <div id="meName">Пользователь</div>
          <div id="meLogin">@username</div>
        </div>

        <button id="logoutBtn" type="button">Выйти</button>
      </div>

      <div class="search-wrap">
        <input
          id="search"
          type="text"
          placeholder="Поиск по @id, например @username"
          autocomplete="off"
        />
      </div>

      <div class="sidebar-scroll">
        <div id="users"></div>
      </div>
    </aside>

    <main class="chat">
      <header class="chat-header">
        <div id="chatAvatar">?</div>

        <div class="chat-head-info">
          <div id="chatName">Выберите чат</div>
          <div id="chatStatus">Выберите личный чат, группу или найдите пользователя</div>
        </div>
      </header>

      <section id="messages">
        <div class="empty">
          Выберите чат слева или найдите пользователя через поиск.
        </div>
      </section>

      <footer class="chat-input">
        <textarea
          id="messageInput"
          placeholder="Сообщение"
          disabled
        ></textarea>

        <button id="sendBtn" type="button" disabled>Отправить</button>
      </footer>
    </main>
  </div>

  <!-- SOCKET.IO -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- WAVESURFER -->
  <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>

  <!-- ОСНОВНАЯ ЛОГИКА -->
  <script src="app.js"></script>

  <!-- UI ОБНОВЛЕНИЙ ELECTRON -->
  <script>
    if (window.require) {
      try {
        const { ipcRenderer } = require("electron");

        const updateBox = document.createElement("div");
        updateBox.id = "updateBox";
        updateBox.style.position = "fixed";
        updateBox.style.right = "18px";
        updateBox.style.bottom = "18px";
        updateBox.style.zIndex = "99999";
        updateBox.style.maxWidth = "360px";
        updateBox.style.padding = "16px";
        updateBox.style.borderRadius = "18px";
        updateBox.style.background = "rgba(10,16,30,.96)";
        updateBox.style.border = "1px solid rgba(255,255,255,.08)";
        updateBox.style.color = "#fff";
        updateBox.style.boxShadow = "0 20px 50px rgba(0,0,0,.45)";
        updateBox.style.display = "none";
        updateBox.style.fontFamily = "Inter, Arial, sans-serif";
        document.body.appendChild(updateBox);

        function showUpdateMessage(text) {
          updateBox.textContent = text;
          updateBox.style.display = "block";
        }

        ipcRenderer.on("update-message", (event, message) => {
          showUpdateMessage(message);
        });

        ipcRenderer.on("update-downloaded", () => {
          updateBox.innerHTML = "";

          const title = document.createElement("div");
          title.textContent = "Обновление загружено";
          title.style.fontWeight = "800";
          title.style.marginBottom = "8px";

          const text = document.createElement("div");
          text.textContent = "Перезапусти приложение, чтобы установить новую версию.";
          text.style.color = "#cbd5e1";
          text.style.fontSize = "14px";
          text.style.marginBottom = "12px";

          const button = document.createElement("button");
          button.textContent = "Перезапустить";
          button.style.background = "linear-gradient(135deg,#06b6d4,#7c3aed)";
          button.style.color = "#fff";
          button.style.border = "none";
          button.style.borderRadius = "12px";
          button.style.padding = "10px 14px";
          button.style.fontWeight = "800";
          button.style.cursor = "pointer";

          button.addEventListener("click", () => {
            ipcRenderer.send("restart-app");
          });

          updateBox.appendChild(title);
          updateBox.appendChild(text);
          updateBox.appendChild(button);
          updateBox.style.display = "block";
        });
      } catch (error) {
        console.log("Electron update UI disabled:", error);
      }
    }
  </script>

  <!-- МЕНЮ СООБЩЕНИЯ -->
  <div id="messageContextMenu" class="message-context-menu hidden">
    <button id="replyMessageBtn" type="button">
      <span>↩</span>
      Ответить
    </button>

    <button id="editMessageBtn" type="button">
      <span>✎</span>
      Редактировать
    </button>

    <button id="deleteMessageBtn" type="button" class="danger">
      <span>🗑</span>
      Удалить
    </button>
  </div>

  <!-- ПАНЕЛЬ ОТВЕТА -->
  <div id="replyPanel" class="reply-panel hidden">
    <div class="reply-panel-line"></div>

    <div class="reply-panel-content">
      <div class="reply-panel-title">Ответ на сообщение</div>
      <div id="replyText" class="reply-panel-text"></div>
    </div>

    <button id="cancelReplyBtn" class="reply-panel-close" type="button">×</button>
  </div>

  <!-- ПАНЕЛЬ РЕДАКТИРОВАНИЯ -->
  <div id="editPanel" class="edit-panel hidden">
    <div class="edit-panel-line"></div>

    <div class="edit-panel-content">
      <div class="edit-panel-title">Редактирование сообщения</div>
      <div class="edit-panel-text">Измени текст и нажми отправить</div>
    </div>

    <button id="cancelEditBtn" class="edit-panel-close" type="button">×</button>
  </div>
</body>
</html>
